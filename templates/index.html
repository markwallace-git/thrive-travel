<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrive Travel Planner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Thrive</h1>
            <p>Your Autonomous AI Travel Operator</p>
        </header>
        
        <!-- Trip History Panel -->
        <div class="trip-history" id="tripHistory">
            <h3>📚 Your Saved Trips</h3>
            <div id="tripList">Loading...</div>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="bubble">
                    Hello! I'm Thrive. Where would you like to travel? 🌍
                </div>
            </div>
        </div>
        
        <!-- Export Button -->
        <div class="export-area" id="exportArea" style="display: none; padding: 15px; text-align: center; background: #f8f9fa; border-top: 1px solid #e9ecef;">
            <button onclick="exportPDF()" style="background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px;">
                📄 Download Itinerary as PDF
            </button>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const tripList = document.getElementById('tripList');
        const exportArea = document.getElementById('exportArea');
        let currentTripId = null;

        // Load trip history on page load
        window.addEventListener('DOMContentLoaded', loadTripHistory);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Load saved trips from database
        async function loadTripHistory() {
            tripList.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('/api/trips');
                const data = await response.json();
                
                if (data.success && data.trips && data.trips.length > 0) {
                    tripList.innerHTML = data.trips.map(trip => `
                        <div class="trip-item" onclick="loadTrip(${trip.id})">
                            <strong>${trip.destination}</strong> (${trip.duration})<br>
                            <small>Trip #${trip.id} - ${trip.created_at}</small>
                        </div>
                    `).join('');
                } else {
                    tripList.innerHTML = '<p>No saved trips yet. Plan your first trip!</p>';
                }
            } catch (error) {
                console.error('Error loading trips:', error);
                tripList.innerHTML = '<p>Error loading trips. Please refresh.</p>';
            }
        }

        // Load and display a specific trip
        async function loadTrip(tripId) {
            // Show loading state
            addMessage(`📂 Loading trip #${tripId}...`, 'bot');
            
            try {
                const response = await fetch('/api/trips');
                const data = await response.json();
                
                if (data.success && data.trips) {
                    const trip = data.trips.find(t => t.id === tripId);
                    
                    if (trip) {
                        // Set current trip for PDF export
                        currentTripId = tripId;
                        exportArea.style.display = 'block';
                        
                        // Display trip summary
                        let message = `✅ <strong>Trip #${tripId} Loaded!</strong>\n\n`;
                        message += `📍 <strong>Destination:</strong> ${trip.destination}\n`;
                        message += `📅 <strong>Duration:</strong> ${trip.duration}\n`;
                        message += `💰 <strong>Budget:</strong> ${trip.budget || 'Not specified'}\n`;
                        message += `🎯 <strong>Preferences:</strong> ${trip.preferences ? trip.preferences.join(', ') : 'None'}\n\n`;
                        
                        // Display itinerary
                        message += `📋 <strong>Itinerary:</strong>\n`;
                        if (trip.itinerary && trip.itinerary.length > 0) {
                            for (const day of trip.itinerary) {
                                message += `\n🗓️ <strong>Day ${day.day}:</strong>\n`;
                                if (day.weather) {
                                    message += `   🌤️ ${day.weather}\n`;
                                }
                                if (day.activities) {
                                    for (const activity of day.activities) {
                                        message += `   • ${activity}\n`;
                                    }
                                }
                            }
                        } else {
                            message += `   (No itinerary details available)\n`;
                        }
                        
                        addMessage(message, 'bot');
                    } else {
                        addMessage(`❌ Trip #${tripId} not found.`, 'bot error');
                    }
                } else {
                    addMessage('❌ Error loading trip data.', 'bot error');
                }
            } catch (error) {
                console.error('Error loading trip:', error);
                addMessage('❌ Connection error. Please try again.', 'bot error');
            }
        }

        // Send message to Thrive
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            const loadingId = addMessage('Thinking...', 'bot loading');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.success) {
                    addMessage(data.message, 'bot');
                    
                    // Extract Trip ID from message
                    const tripIdMatch = data.message.match(/Trip ID: #(\d+)/);
                    if (tripIdMatch) {
                        currentTripId = tripIdMatch[1];
                        exportArea.style.display = 'block';
                        // Reload trip history to show new trip
                        loadTripHistory();
                    }
                } else {
                    addMessage('Error: ' + data.error, 'bot error');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Connection error. Please try again.', 'bot error');
            }
        }

        // Export trip as PDF
        function exportPDF() {
            if (!currentTripId) {
                alert('No trip selected for export');
                return;
            }
            
            fetch('/api/export-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ trip_id: currentTripId })
            })
            .then(response => {
                if (response.ok) {
                    return response.blob();
                }
                throw new Error('Failed to generate PDF');
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `thrive-trip-${currentTripId}.pdf`;
                a.click();
                window.URL.revokeObjectURL(url);
            })
            .catch(error => {
                alert('Error generating PDF: ' + error.message);
            });
        }

        // Add message to chat
        function addMessage(text, type) {
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.id = id;
            div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
