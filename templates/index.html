<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Thrive Travel Planner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Thrive</h1>
            <p>Your Autonomous AI Travel Operator</p>
        </header>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="bubble">
                    Hello! I'm Thrive. Where would you like to travel? 🌍
                </div>
            </div>
        </div>
        <!-- Add this button below the chat box, before input-area -->
<div class="export-area" id="exportArea" style="display: none; padding: 15px; text-align: center;">
    <button onclick="exportPDF()" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer;">
        📄 Download Itinerary as PDF
    </button>
</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let currentTripId = null;
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        // Send message on Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            userInput.value = '';

            // Show loading state
            const loadingId = addMessage('Thinking...', 'bot loading');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Remove loading message
                document.getElementById(loadingId).remove();

              if (data.success) {
    addMessage(data.message, 'bot');
    
    // Extract Trip ID from message if present
    const tripIdMatch = data.message.match(/Trip ID: #(\d+)/);
    if (tripIdMatch) {
        currentTripId = tripIdMatch[1];
        document.getElementById('exportArea').style.display = 'block';
    }
                } else {
                    addMessage('Error: ' + data.error, 'bot error');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessage('Connection error. Please try again.', 'bot error');
            }
        }

        function addMessage(text, type) {
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.id = id;
            div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
        // Add to the <script> section in index.html


function exportPDF() {
    if (!currentTripId) return;
    
    fetch('/api/export-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trip_id: currentTripId })
    })
    .then(response => {
        if (response.ok) {
            return response.blob();
        }
        throw new Error('Failed to generate PDF');
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `thrive-trip-${currentTripId}.pdf`;
        a.click();
    })
    .catch(error => {
        alert('Error generating PDF: ' + error.message);
    });
}
    </script>
</body>
</html>
